{% extends 'blog/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm mt-4 p-3">
            <div class="card-body">
                <h3 class="mb-4">{{ title }}</h3>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Title</label>
                        {{ form.title }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Content</label>
                        {{ form.content }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Save Post</button>
                    <a href="{% url 'home' %}" class="btn btn-secondary w-100 mt-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
