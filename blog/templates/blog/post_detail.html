{% extends 'blog/base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-7 offset-md-2">
        <div class="card p-4 mt-3">
            <div class="card-body">
                <h2 class="card-title">{{ post.title }}</h2>
                <p class="text-muted">
                    <small>By <strong>{{ post.author }}</strong> · {{ post.created_at|date:"d M Y" }}</small>
                </p>
                <hr>
                <p class="card-text" style="line-height: 1.9; font-size: 1.05rem;">{{ post.content }}</p>
                <hr>
                <a href="{% url 'home' %}" class="btn btn-secondary btn-sm">← Back to Home</a>
                {% if request.user == post.author %}
                    <a href="{% url 'post_edit' post.pk %}" class="btn btn-warning btn-sm ms-2">Edit</a>
                    <a href="{% url 'post_delete' post.pk %}" class="btn btn-danger btn-sm ms-2">Delete</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
