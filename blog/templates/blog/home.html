<!DOCTYPE html>
<html>
<head>
    <title>Blog</title>
</head>
<body>
    <h1>All Blog Posts</h1>
    {% for post in posts %}
        <div>
            <h2>{{ post.title }}</h2>
            <p>By {{ post.author }} | {{ post.created_at|date:"d M Y" }}</p>
            <a href="#">Read More</a>
        </div>
        <hr>
    {% endfor %}
</body>
</html>
