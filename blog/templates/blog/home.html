{% extends 'blog/base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <h2 class="mb-4">All Blog Posts</h2>
        {% for post in posts %}
            <div class="card mb-3 shadow-sm">
                <div class="card-body">
                    <h4 class="card-title">{{ post.title }}</h4>
                    <p class="text-muted mb-2">
                        <small>By <strong>{{ post.author }}</strong> | {{ post.created_at|date:"d M Y" }}</small>
                    </p>
                    <p class="card-text">{{ post.content|truncatewords:20 }}</p>
                    <a href="{% url 'post_detail' post.pk %}" class="btn btn-primary btn-sm">Read More</a>
                </div>
            </div>
        {% empty %}
            <div class="alert alert-info">No posts available yet.</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
