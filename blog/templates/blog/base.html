<!DOCTYPE html>
<html>
<head>
    <title>MyBlog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #faf6f1;
            font-family: 'Poppins', sans-serif;
            color: #4a3728;
        }

        h1, h2, h3, h4, h5 {
            font-family: 'Playfair Display', serif;
            color: #3d2b1f;
        }

        .navbar {
            background-color: #f2ebe3 !important;
            border-bottom: 1px solid #e0d5c5;
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: #7a4f35 !important;
            font-style: italic;
        }

        .nav-link, .navbar a {
            color: #7a4f35 !important;
        }

        .btn-primary {
            background-color: #8B6343;
            border-color: #8B6343;
            color: white;
        }

        .btn-primary:hover {
            background-color: #6e4e35 !important;
            border-color: #6e4e35 !important;
            color: white !important;
        }

        .btn-outline-light {
            border-color: #7a4f35 !important;
            color: #7a4f35 !important;
        }

        .btn-outline-light:hover {
            background-color: #7a4f35 !important;
            color: white !important;
        }

        .btn-light {
            background-color: #f2ebe3;
            color: #7a4f35;
            border-color: #7a4f35;
        }

        .btn-light:hover {
            background-color: #7a4f35 !important;
            color: white !important;
            border-color: #7a4f35 !important;
        }

        .btn-secondary {
            background-color: #c4a882;
            border-color: #c4a882;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #a88a65 !important;
            border-color: #a88a65 !important;
            color: white !important;
        }

        .btn-warning {
            background-color: #e8c99a;
            border-color: #e8c99a;
            color: #4a3728;
        }

        .btn-warning:hover {
            background-color: #d4a870 !important;
            color: #4a3728 !important;
        }

        .btn-danger {
            background-color: #c47a6a;
            border-color: #c47a6a;
            color: white;
        }

        .btn-danger:hover {
            background-color: #a85a4a !important;
            color: white !important;
        }

        .card {
            border: 1px solid #e0d5c5;
            border-radius: 10px;
            background-color: #fffdf9;
        }

        .card:hover {
            box-shadow: 0 4px 20px rgba(120, 80, 50, 0.1);
            transition: 0.3s;
        }

        .text-muted {
            color: #9a7e6a !important;
        }

        hr {
            border-color: #e0d5c5;
        }

        .alert-info {
            background-color: #f5efe6;
            border-color: #e0d5c5;
            color: #7a4f35;
        }

        input.form-control, textarea.form-control {
            border: 1px solid #e0d5c5;
            border-radius: 8px;
            background-color: #fffdf9;
            color: #4a3728;
        }

        input.form-control:focus, textarea.form-control:focus {
            border-color: #8B6343;
            box-shadow: 0 0 0 0.2rem rgba(139, 99, 67, 0.2);
        }

        .form-label {
            color: #3d2b1f;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
        }

        a {
            color: #8B6343;
        }

        a:hover {
            color: #6e4e35;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 60px;
            color: #9a7e6a;
            font-size: 0.85rem;
            border-top: 1px solid #e0d5c5;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">✦ MyBlog</a>
        <div class="ms-auto">
            {% if request.user.is_authenticated %}
                <a href="{% url 'post_create' %}" class="btn btn-outline-light btn-sm me-2">+ New Post</a>
                <span class="me-3" style="color: #7a4f35;">Hello, {{ request.user.username }}</span>
                <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">Login</a>
                <a href="{% url 'register' %}" class="btn btn-light btn-sm">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<footer>
    <p>Made with ♥ · MyBlog © 2026</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
