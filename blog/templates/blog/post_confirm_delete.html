{% extends 'blog/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm mt-5 p-3 text-center">
            <div class="card-body">
                <h3 class="mb-3">Delete Post</h3>
                <p style="color: #9a7e6a;">Are you sure you want to delete <strong>{{ post.title }}</strong>?</p>
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
                    <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
